  // Adiciona uma medição extra ao contrato (útil quando obra estende além do prazo)
  adicionarMedicao(orcId) {
    const orc = state.orcamentos.find(o => o.id === orcId);
    if (!orc) return;
    const data = prompt('Data prevista para esta medição (DD/MM/AAAA):', '');
    if (!data) return;
    // Aceita DD/MM/AAAA ou AAAA-MM-DD
    let iso = data.trim();
    const m = iso.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) iso = `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) { showToast('Data inválida. Use DD/MM/AAAA.', 'error'); return; }
    // Define dataLeitura = um dia antes do pagamento
    const dt = new Date(iso + 'T00:00:00');
    const dtLeitura = new Date(dt); dtLeitura.setDate(dtLeitura.getDate() - 1);
    const dataLeitura = dtLeitura.toISOString().slice(0, 10);

    const medicoes = (orc.parcelas || []).filter(p => p.tipo === 'medicao');
    const num = medicoes.length + 1;
    orc.parcelas = [...(orc.parcelas || []), {
      id: uid(), tipo: 'medicao',
      descricao: `Medição ${num}`,
      dataLeitura, dataPrevista: iso,
      pagamentos: []
    }];
    // Reordena medições por data prevista pra manter timeline coerente
    const entrada = orc.parcelas.filter(p => p.tipo === 'entrada');
    const medi = orc.parcelas.filter(p => p.tipo === 'medicao')
      .sort((a, b) => (a.dataPrevista || '').localeCompare(b.dataPrevista || ''))
      .map((m, i) => ({ ...m, descricao: (m.pagamentos || []).length === 0 ? `Medição ${i + 1}` : m.descricao }));
    orc.parcelas = [...entrada, ...medi];

    const arr = [...state.orcamentos];
    const idx = arr.findIndex(o => o.id === orc.id);
    if (idx >= 0) { arr[idx] = orc; persist('orcamentos', arr); }
    if (state.currentOrc && state.currentOrc.id === orc.id) state.currentOrc = orc;
    showToast('Medição adicionada.', 'success');
    render();
  },

  editarDataMedicao(orcId, parcelaId) {
    const orc = state.orcamentos.find(o => o.id === orcId);
    if (!orc) return;
    const p = (orc.parcelas || []).find(x => x.id === parcelaId);
    if (!p) return;
    const atual = p.dataPrevista ? fmtData(p.dataPrevista) : '';
    const novaStr = prompt(`Nova data de pagamento (DD/MM/AAAA):`, atual);
    if (!novaStr) return;
    let iso = novaStr.trim();
    const m = iso.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) iso = `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) { showToast('Data inválida.', 'error'); return; }
    p.dataPrevista = iso;
    const dt = new Date(iso + 'T00:00:00');
    const dtLeitura = new Date(dt); dtLeitura.setDate(dtLeitura.getDate() - 1);
    p.dataLeitura = dtLeitura.toISOString().slice(0, 10);

    const arr = [...state.orcamentos];
    const idx = arr.findIndex(o => o.id === orc.id);
    if (idx >= 0) { arr[idx] = orc; persist('orcamentos', arr); }
    if (state.currentOrc && state.currentOrc.id === orc.id) state.currentOrc = orc;
    showToast('Data atualizada.', 'success');
    render();
  },

  excluirMedicao(orcId, parcelaId) {
    const orc = state.orcamentos.find(o => o.id === orcId);
    if (!orc) return;
    const p = (orc.parcelas || []).find(x => x.id === parcelaId);
    if (!p) return;
    if ((p.pagamentos || []).length > 0) {
      showToast('Não dá pra excluir uma medição que já tem pagamento. Exclua os pagamentos antes.', 'error');
      return;
    }
    if (!confirm(`Excluir "${p.descricao}"?`)) return;
    orc.parcelas = orc.parcelas.filter(x => x.id !== parcelaId);
    // Renumera as medições restantes que não têm pagamento
    let i = 0;
    orc.parcelas.forEach(x => {
      if (x.tipo === 'medicao' && (x.pagamentos || []).length === 0) {
        i++;
        x.descricao = `Medição ${i + (orc.parcelas.filter(y => y.tipo === 'medicao' && (y.pagamentos || []).length > 0).length)}`;
      }
    });
    const arr = [...state.orcamentos];
    const idx = arr.findIndex(o => o.id === orc.id);
    if (idx >= 0) { arr[idx] = orc; persist('orcamentos', arr); }
    if (state.currentOrc && state.currentOrc.id === orc.id) state.currentOrc = orc;
    showToast('Medição excluída.', 'success');
    render();
  },

  mudarModo(m) {
    if (!state.currentOrc) return;
    state.currentOrc.modoExibicao = m;
    actions.salvarOrcSilent();
    render();
  },

  mudarTipoContrato(t) {
    if (!state.currentOrc) return;
    state.currentOrc.tipoContrato = t;
    actions.salvarOrcSilent();
    render();
  },

  salvarOrcSilent() {
    if (!state.currentOrc) return;
    const idx = state.orcamentos.findIndex(o => o.id === state.currentOrc.id);
    if (idx >= 0) {
      const arr = [...state.orcamentos];
      arr[idx] = { ...state.currentOrc, updatedAt: new Date().toISOString() };
      persist('orcamentos', arr);
    }
  },

  gerarContrato() { state.view = 'contrato'; render(); },

  imprimir() { window.print(); },

  async compartilhar() {
    // Caso especial: tela do recibo (não depende de currentOrc)
    if (state.view === 'recibo') {
      const ref = state.reciboRef;
      const o = ref ? state.orcamentos.find(x => x.id === ref.orcId) : null;
      const parcela = o ? (o.parcelas || []).find(p => p.id === ref.parcelaId) : null;
      const pagamento = parcela ? (parcela.pagamentos || []).find(pg => pg.id === ref.pagamentoId) : null;
      if (!o || !parcela || !pagamento) { window.print(); return; }
      const seq = String(numeroRecibo(o, pagamento)).padStart(2, '0');
      const texto = montarTextoRecibo(o, parcela, pagamento);
      const titulo = `Recibo Nº ${seq}/${o.numero} - ${state.empresa?.nome || 'EI Construtora'}`;
      return await this._shareWithFallback(texto, titulo);
    }

    const o = state.currentOrc;
    if (!o) { window.print(); return; }

    const ehContrato = state.view === 'contrato';
    const texto = ehContrato ? montarTextoContrato(o) : montarTextoOrcamento(o);
    const titulo = ehContrato
      ? `Contrato Nº ${o.numero} - ${state.empresa?.nome || 'EI Construtora'}`
      : `Proposta Nº ${o.numero} - ${state.empresa?.nome || 'EI Construtora'}`;
    return await this._shareWithFallback(texto, titulo);
  },

  // Fluxo de share + fallbacks (extraído pra reuso entre orçamento, contrato e recibo)
  async _shareWithFallback(texto, titulo) {
    if (navigator.share) {
      try {
        await navigator.share({ title: titulo, text: texto });
        return;
      } catch (err) {
        if (err && err.name === 'AbortError') return;
      }
    }
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(texto);
        alert('Compartilhamento direto não disponível neste navegador.\n\nO texto foi copiado para a área de transferência — basta colar no WhatsApp, e-mail ou qualquer app.\n\nPara gerar o PDF, use o botão "PDF" ao lado.');
        return;
      }
    } catch (err) { /* segue */ }
    try {
      const ta = document.createElement('textarea');
      ta.value = texto;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) { alert('Texto copiado.\nCole no WhatsApp, e-mail ou qualquer app de mensagens.'); return; }
    } catch (err) { /* desistir */ }
    window.print();
  },

  fecharModal() { state.modal = null; render(); },

  catalogoBusca(v) { state.catalogoFiltro.busca = v; renderCatalogoList(); },
  catalogoCat(v) { state.catalogoFiltro.cat = v; renderCatalogoList(); },
  catalogoSelectorBusca(v) { state.catalogoSelectorFiltro.busca = v; renderCatalogoSelectorList(); },
  catalogoSelectorCat(v) { state.catalogoSelectorFiltro.cat = v; renderCatalogoSelectorList(); },

  novoItemCatalogo() {
    state.modal = { type: 'catItem', data: { id: '', cat: '', desc: '', un: 'm²', val: 0 } };
    render();
  },

  editarItemCatalogo(id) {
    const it = state.catalogo.find(i => i.id === id);
    if (it) { state.modal = { type: 'catItem', data: { ...it } }; render(); }
  },

  salvarItemCatalogo() {
    const f = document.getElementById('cat-form');
    const cat = f.querySelector('[name=cat]').value.trim();
    const desc = f.querySelector('[name=desc]').value.trim();
    const un = f.querySelector('[name=un]').value;
    const val = parseFloat(f.querySelector('[name=val]').value) || 0;
    const tipo = f.querySelector('[name=tipo]')?.value || 'servico';
    const id = f.querySelector('[name=id]').value;
    if (!cat || !desc) { alert('Preencha categoria e descrição.'); return; }
    if (id) {
      persist('catalogo', state.catalogo.map(i => i.id === id ? { id, cat, desc, un, val, tipo } : i));
      showToast('Item atualizado');
    } else {
      persist('catalogo', [...state.catalogo, { id: uid(), cat, desc, un, val, tipo }]);
      showToast('Item adicionado');
    }
    state.modal = null;
    render();
  },

  excluirItemCatalogo(id) {
    if (!confirm('Remover este item do catálogo?')) return;
    persist('catalogo', state.catalogo.filter(i => i.id !== id));
    showToast('Item removido');
    render();
  },

  salvarEmpresa() {
    const f = document.getElementById('empresa-form');
    const dados = {};
    f.querySelectorAll('[name]').forEach(el => { dados[el.name] = el.value; });
    persist('empresa', dados);
    showToast('Dados da empresa salvos');
    render();
  },

  resetCatalogo() {
    if (!confirm('Restaurar catálogo padrão? Suas customizações serão perdidas.')) return;
    persist('catalogo', [...DEFAULT_CATALOG]);
    showToast('Catálogo restaurado');
    render();
  },

  restaurarMateriais() {
    if (!confirm('Recarregar os materiais padrão? Isso substitui APENAS os itens marcados como Material. Seus serviços e orçamentos não são afetados.')) return;
    const semMat = state.catalogo.filter(i => (i.tipo || 'servico') !== 'material');
    const matPadrao = DEFAULT_CATALOG.filter(i => i.tipo === 'material');
    persist('catalogo', [...semMat, ...matPadrao]);
    showToast(`${matPadrao.length} materiais carregados`);
    render();
  },

  limparOrcamentos() {
    if (!confirm('ATENÇÃO: Apagar TODOS os orçamentos? Esta ação é irreversível.')) return;
    if (!confirm('Confirma novamente? Todos os orçamentos serão apagados.')) return;
    persist('orcamentos', []);
    showToast('Orçamentos apagados');
    render();
  },

  exportarBackup() {
    const data = {
      empresa: state.empresa,
      catalogo: state.catalogo,
      orcamentos: state.orcamentos,
      manualFichas: state.manualFichas,
      manualRecentes: state.manualRecentes,
      laudos: state.laudos,
      exportadoEm: new Date().toISOString(),
      version: 4
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'ei-construtor-backup-' + today() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup exportado');
  },

  importarBackup() {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.orcamentos || !data.catalogo || !data.empresa) { alert('Arquivo de backup inválido.'); return; }
          if (!confirm('Importar backup? Os dados atuais serão SUBSTITUÍDOS pelos do arquivo.')) return;
          persist('orcamentos', data.orcamentos);
          persist('catalogo', data.catalogo);
          persist('empresa', { ...COMPANY_DEFAULT, ...data.empresa });
          if (Array.isArray(data.manualFichas)) persist('manualFichas', data.manualFichas);
          if (Array.isArray(data.manualRecentes)) persist('manualRecentes', data.manualRecentes);
          if (Array.isArray(data.laudos)) persist('laudos', data.laudos);
          showToast('Backup importado');
          render();
        } catch (err) { alert('Erro ao ler o arquivo: ' + err.message); }
      };
      reader.readAsText(file);
    };
    inp.click();
  },

  listaBusca(v) { state.listaFiltro.busca = v; renderListaConteudo(); },
  listaStatus(v) { state.listaFiltro.status = v; renderListaConteudo(); },
};

function render() {
  document.getElementById('app').innerHTML = `
    ${renderHeader()}
    <main class="main">${renderView()}</main>
    ${renderBottomNav()}
    ${renderModal()}
    ${renderToast()}
  `;
}

function renderHeader() {
  return `
    <header class="header no-print">
      <div class="header-inner">
        <div class="header-logo" onclick="actions.setView('home')">${logoSVG('sm')}</div>
        <nav class="nav-desktop">
          <button class="nav-btn ${state.view === 'home' ? 'active' : ''}" onclick="actions.setView('home')">${ICON.home}Início</button>
          <button class="nav-btn" onclick="actions.novoOrcamento()">${ICON.plus}Novo</button>
          <button class="nav-btn ${state.view === 'lista' ? 'active' : ''}" onclick="actions.setView('lista')">${ICON.file}Histórico</button>
          <button class="nav-btn ${state.view === 'financeiro' ? 'active' : ''}" onclick="actions.irParaFinanceiro()">${ICON.check}Financeiro</button>
          <button class="nav-btn ${(state.view === 'laudos' || state.view === 'laudo' || state.view === 'fissura') ? 'active' : ''}" onclick="actions.irParaVistorias()">${ICON.clipboard}Vistorias</button>
          <button class="nav-btn ${(state.view === 'manual' || state.view === 'manualCategoria' || state.view === 'manualFicha') ? 'active' : ''}" onclick="actions.irParaManual()">${ICON.book}Manual</button>
          <button class="nav-btn ${state.view === 'catalogo' ? 'active' : ''}" onclick="actions.setView('catalogo')">${ICON.package}Catálogo</button>
          <button class="nav-btn ${state.view === 'config' ? 'active' : ''}" onclick="actions.setView('config')">${ICON.settings}Config.</button>
        </nav>
      </div>
    </header>
  `;
}

function renderBottomNav() {
  const bn = (view, label, icon, action, highlight) => `
    <button class="bottom-btn ${highlight ? 'highlight' : (state.view === view ? 'active' : '')}" onclick="${action}">
      ${icon}<span class="bottom-btn-label">${label}</span>
    </button>`;
  return `
    <nav class="bottom-nav no-print">
      ${bn('home', 'Início', ICON.home, "actions.setView('home')")}
      ${bn('editar', 'Novo', ICON.plus, "actions.novoOrcamento()", true)}
      ${bn('lista', 'Histórico', ICON.file, "actions.setView('lista')")}
      ${bn('financeiro', 'Financeiro', ICON.check, "actions.irParaFinanceiro()")}
      ${bn('laudos', 'Vistorias', ICON.clipboard, "actions.irParaVistorias()")}
    </nav>
  `;
}

function renderToast() {
  if (!state.toast) return '';
  return `<div class="toast ${state.toast.type}">${esc(state.toast.msg)}</div>`;
}

function renderView() {
  switch (state.view) {
    case 'home': return renderHome();
    case 'lista': return renderLista();
    case 'editar': return renderEditar();
    case 'visualizar': return renderVisualizar();
    case 'contrato': return renderContrato();
    case 'catalogo': return renderCatalogo();
    case 'config': return renderConfig();
    case 'financeiro': return renderFinanceiro();
    case 'recibo': return renderRecibo();
    case 'manual': return renderManualHome();
    case 'manualCategoria': return renderManualCategoria();
    case 'manualFicha': return renderManualFicha();
    case 'laudos': return renderLaudosLista();
    case 'laudo': return renderLaudoDetalhe();
    case 'fissura': return renderFissuraDetalhe();
    case 'laudoRelatorio': return renderLaudoRelatorio();
    default: return renderHome();
  }
}

// ============ FINANCEIRO ============
function renderFinanceiro() {
  const ag = getFinanceiroAggregado();
  const filtro = state.financeiroFiltro || 'todas';
  const itens = listarParcelas(filtro);
  const pctRecebido = ag.contratado > 0 ? Math.round(ag.recebido / ag.contratado * 100) : 0;

  // agrupa visualmente por orçamento
  const grupos = {};
  itens.forEach(i => {
    const k = i.orc.id;
    if (!grupos[k]) grupos[k] = { orc: i.orc, parcelas: [] };
    grupos[k].parcelas.push(i);
  });
  const gruposArr = Object.values(grupos);

  return `
    <div class="stack">
      <div class="row-between flex-wrap" style="margin-bottom: 4px;">
        <div>
          <div class="hero-title" style="font-size: 22px;">Financeiro</div>
          <div class="hero-sub">${ag.nContratos} contrato${ag.nContratos === 1 ? '' : 's'} ativo${ag.nContratos === 1 ? '' : 's'} • ${ag.nConcluidos} concluído${ag.nConcluidos === 1 ? '' : 's'}</div>
        </div>
      </div>

      <div class="fin-kpis">
        <div class="fin-kpi">
          <div class="fin-kpi-label">Contratado</div>
          <div class="fin-kpi-value">${fmtBRL(ag.contratado)}</div>
        </div>
        <div class="fin-kpi fin-kpi-success">
          <div class="fin-kpi-label">Recebido</div>
          <div class="fin-kpi-value">${fmtBRL(ag.recebido)}</div>
          <div class="fin-kpi-sub">${pctRecebido}% do contratado</div>
        </div>
        <div class="fin-kpi fin-kpi-info">
          <div class="fin-kpi-label">A receber</div>
          <div class="fin-kpi-value">${fmtBRL(ag.areceber)}</div>
        </div>
        <div class="fin-kpi ${(ag.atrasado > 0 || ag.nAMedir > 0) ? 'fin-kpi-danger' : ''}">
          <div class="fin-kpi-label">Pendências</div>
          <div class="fin-kpi-value">${ag.atrasado > 0 ? fmtBRL(ag.atrasado) : (ag.nAMedir > 0 ? ag.nAMedir : '—')}</div>
          ${ag.nAtrasadas > 0 || ag.nAMedir > 0 ? `<div class="fin-kpi-sub">${ag.nAtrasadas > 0 ? `${ag.nAtrasadas} entrada${ag.nAtrasadas === 1 ? '' : 's'} atrasada${ag.nAtrasadas === 1 ? '' : 's'}` : ''}${ag.nAtrasadas > 0 && ag.nAMedir > 0 ? ' • ' : ''}${ag.nAMedir > 0 ? `${ag.nAMedir} a medir` : ''}</div>` : ''}
        </div>
      </div>

      <div class="mode-row no-print">
        <span class="mode-row-label">Mostrar:</span>
        <button class="mode-btn ${filtro === 'todas' ? 'active' : ''}" onclick="actions.setFinanceiroFiltro('todas')">Todas</button>
        <button class="mode-btn ${filtro === 'atrasadas' ? 'active' : ''}" onclick="actions.setFinanceiroFiltro('atrasadas')">Pendências${(ag.nAtrasadas + ag.nAMedir) > 0 ? ` (${ag.nAtrasadas + ag.nAMedir})` : ''}</button>
        <button class="mode-btn ${filtro === 'semana' ? 'active' : ''}" onclick="actions.setFinanceiroFiltro('semana')">Próx. 7 dias</button>
        <button class="mode-btn ${filtro === 'mes' ? 'active' : ''}" onclick="actions.setFinanceiroFiltro('mes')">Próx. 30 dias</button>
        <button class="mode-btn ${filtro === 'pagas' ? 'active' : ''}" onclick="actions.setFinanceiroFiltro('pagas')">Apuradas</button>
      </div>

      ${gruposArr.length === 0 ? `
        <div class="card empty">
          ${ICON.file}
          <div class="empty-msg">
            ${filtro === 'todas'
              ? 'Nenhum contrato ativo ainda. Aprove um orçamento para gerar parcelas automaticamente.'
              : 'Nenhuma parcela neste filtro.'}
          </div>
        </div>
      ` : gruposArr.map(g => renderFinanceiroGrupo(g)).join('')}
    </div>
  `;
}

function renderFinanceiroGrupo(g) {
  const o = g.orc;
  const totalOrc = calcTotalOrc(o);
  const pagoOrc = (o.parcelas || []).reduce((s, p) => s + parcelaTotalPago(p), 0);
  const saldoOrc = Math.max(0, totalOrc - pagoOrc);
  const concluido = saldoOrc <= 0.01;
  return `
    <div class="card">
      <div class="row-between mb-3" style="align-items: flex-start; gap: 12px;">
        <div style="flex: 1; min-width: 0;">
          <div class="row" style="gap: 8px; flex-wrap: wrap;">
            <span class="orc-numero">Nº ${esc(o.numero)}</span>
            ${concluido ? `<span class="badge badge-aprovado">concluído</span>` : ''}
          </div>
          <div style="font-weight: 600; margin-top: 4px;">${esc(o.cliente?.nome || '—')}</div>
          <div style="font-size: 13px; color: var(--muted);">${esc(o.obra?.descricao || '')}</div>
        </div>
        <div style="text-align: right; font-size: 13px;">
          <div><span style="color: var(--muted);">Total:</span> <strong>${fmtBRL(totalOrc)}</strong></div>
          <div style="color: var(--success);">Recebido: ${fmtBRL(pagoOrc)}</div>
          ${saldoOrc > 0 ? `<div style="color: var(--secondary);">Saldo: <strong>${fmtBRL(saldoOrc)}</strong></div>` : ''}
        </div>
      </div>
      <div class="stack-sm">
        ${g.parcelas.map(item => renderParcelaRow(item, o.id)).join('')}
      </div>
      <div class="row flex-wrap" style="gap: 8px; margin-top: 12px;">
        <button class="btn btn-ghost btn-sm" onclick="actions.abrirOrc('${o.id}')">${ICON.file} Abrir orçamento</button>
        <button class="btn btn-ghost btn-sm" onclick="actions.adicionarMedicao('${o.id}')">${ICON.plus} Nova medição</button>
      </div>
    </div>
  `;
}

function renderParcelaRow(item, orcId) {
  const p = item.parcela;
  const st = item.status;
  const pago = parcelaTotalPago(p);
  const dataFmt = fmtData(p.dataPrevista);
  const ehEntrada = p.tipo === 'entrada';
  const previsto = Number(p.valorPrevisto || 0);
  const saldoEntrada = ehEntrada ? parcelaSaldo(p) : 0;
  const podeReceber = ehEntrada ? saldoEntrada > 0 : true; // medição sempre pode receber mais

  // Lado direito da linha: depende do tipo + status
  let direita = '';
  if (ehEntrada) {
    direita = `
      <div><strong>${fmtBRL(previsto)}</strong></div>
      ${pago > 0 ? `<div style="font-size: 12px; color: var(--success);">Pago ${fmtBRL(pago)}</div>` : ''}
      ${saldoEntrada > 0 && pago > 0 ? `<div style="font-size: 12px; color: var(--secondary);">Saldo ${fmtBRL(saldoEntrada)}</div>` : ''}
    `;
  } else if (pago > 0) {
    direita = `<div style="font-size: 11px; color: var(--muted);">Apurado</div><div style="font-weight: 700; color: var(--success);">${fmtBRL(pago)}</div>`;
  } else {
    direita = `<div style="font-size: 11px; color: var(--muted); text-align: right;">${st === 'a-medir' ? '⚠ a medir' : 'a apurar'}</div>`;
  }

  return `
    <div class="parcela-row parcela-${st}">
      <div class="row-between" style="gap: 8px; align-items: flex-start;">
        <div style="flex: 1; min-width: 0;">
          <div class="row" style="gap: 8px; flex-wrap: wrap;">
            <strong>${esc(p.descricao)}</strong>
            <span class="badge-parcela badge-${st}">${statusLabel(st)}</span>
          </div>
          <div style="font-size: 12px; color: var(--muted); margin-top: 2px;">

  const totalOrc = calcTotalOrc(o);
  const pagoOrc = (o.parcelas || []).reduce((s, p) => s + parcelaTotalPago(p), 0);
  const saldoOrc = Math.max(0, totalOrc - pagoOrc);
  const pct = totalOrc > 0 ? Math.round(pagoOrc / totalOrc * 100) : 0;
  return `
    <div class="card no-print" style="border-left: 4px solid var(--primary);">
      <div class="row-between mb-3 flex-wrap" style="gap: 8px;">
        <div class="card-title" style="margin: 0;">${ICON.check} Parcelas do contrato</div>

          <button class="btn btn-ghost btn-sm" onclick="actions.recalcularParcelas('${o.id}')" title="Recriar a timeline com a data de início e prazo atuais. Pagamentos preservados.">${ICON.copy} Recalcular datas</button>
          <button class="btn btn-ghost btn-sm" onclick="actions.irParaFinanceiro()">${ICON.file} Ver Financeiro</button>
        </div>
      </div>

      <div class="fin-home-grid" style="margin-bottom: 12px;">
        <div>
          <div style="font-size: 12px; color: var(--muted);">Contratado</div>
          <div style="font-weight: 700; font-size: 16px;">${fmtBRL(totalOrc)}</div>
        </div>
        <div>
          <div style="font-size: 12px; color: var(--muted);">Recebido</div>
          <div style="font-weight: 700; color: var(--success); font-size: 16px;">${fmtBRL(pagoOrc)}</div>
          <div style="font-size: 11px; color: var(--muted);">${pct}% do contrato</div>
        </div>
        <div>
          <div style="font-size: 12px; color: var(--muted);">Saldo</div>
          <div style="font-weight: 700; color: var(--secondary); font-size: 16px;">${fmtBRL(saldoOrc)}</div>

      <div style="font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 8px; padding: 8px 10px; background: #F9FAFB; border-radius: 6px;">
        ℹ As medições são <strong>abertas</strong> — o valor de cada quinzena é apurado conforme o avanço da obra (laje vale mais, elétrica vale menos). O contrato fecha quando a soma dos pagamentos bate com o total contratado.

      <div class="stack-sm">

        <button class="btn btn-ghost btn-sm" onclick="actions.adicionarMedicao('${o.id}')">${ICON.plus} Nova medição</button>

// ============ RECIBO ============
function renderRecibo() {
  const ref = state.reciboRef;
  if (!ref) {
    return `<div class="card empty">${ICON.file}<div class="empty-msg">Recibo não encontrado.</div><button class="btn btn-ghost btn-sm" onclick="actions.irParaFinanceiro()">${ICON.chevronLeft} Voltar ao Financeiro</button></div>`;
  }
  const orc = state.orcamentos.find(o => o.id === ref.orcId);
  const parcela = orc ? (orc.parcelas || []).find(p => p.id === ref.parcelaId) : null;
  const pagamento = parcela ? (parcela.pagamentos || []).find(pg => pg.id === ref.pagamentoId) : null;

  if (!orc || !parcela || !pagamento) {
    return `<div class="card empty">${ICON.file}<div class="empty-msg">Pagamento não encontrado (pode ter sido excluído).</div><div class="row" style="gap: 8px; margin-top: 12px;"><button class="btn btn-ghost btn-sm" onclick="actions.irParaFinanceiro()">${ICON.chevronLeft} Voltar ao Financeiro</button></div></div>`;
  }

  const emp = state.empresa || {};
  const seq = String(numeroRecibo(orc, pagamento)).padStart(2, '0');
  const total = calcTotalOrc(orc);
  // Calcula pago até este recibo (inclusive)
  const todosPagos = [];
  (orc.parcelas || []).forEach(p => (p.pagamentos || []).forEach(pg => todosPagos.push({ ...pg, parcelaDesc: p.descricao, tipo: p.tipo })));
  todosPagos.sort((a, b) => {
    const d = (a.data || '').localeCompare(b.data || '');
    if (d !== 0) return d;
    return (a.id || '').localeCompare(b.id || '');
  });
  const idxAtual = todosPagos.findIndex(t => t.id === pagamento.id);
  const pagoAteAgora = todosPagos.slice(0, idxAtual + 1).reduce((s, pg) => s + Number(pg.valor || 0), 0);
  const saldoApos = round2(Math.max(0, total - pagoAteAgora));

  const refDescricao = parcela.tipo === 'entrada'
    ? 'entrada do contrato'
    : `${parcela.descricao}${pagamento.observacao ? ' — ' + pagamento.observacao : ''}`;

  return `
    <div class="stack">
      <div class="row-between flex-wrap no-print">
        <button class="back-btn" onclick="actions.irParaFinanceiro()">${ICON.chevronLeft} Voltar ao Financeiro</button>
        <div class="row flex-wrap" style="gap: 8px;">
          <button class="btn btn-primary" onclick="actions.compartilhar()">${ICON.share} Compartilhar</button>
          <button class="btn btn-ghost" onclick="actions.imprimir()" title="Imprimir ou salvar como PDF">${ICON.printer} PDF</button>
        </div>
      </div>

      <div class="print-page recibo-page">
        <div class="recibo-header">
          ${logoSVG(56)}
          <div class="recibo-empresa">
            <div class="recibo-empresa-nome">${esc(emp.nome || 'Sua Empresa')}</div>
            <div class="recibo-empresa-dados">
              ${emp.cnpj ? `CNPJ ${esc(emp.cnpj)}` : ''}
              ${emp.endereco ? `<br>${esc(emp.endereco)}` : ''}
              ${emp.telefone ? `<br>Tel: ${esc(emp.telefone)}` : ''}
              ${emp.email ? ` • ${esc(emp.email)}` : ''}
              ${emp.crea ? `<br>${esc(emp.crea)}` : ''}
              ${emp.crt ? ` • ${esc(emp.crt)}` : ''}
            </div>
          </div>
        </div>

        <div class="recibo-titulo">
          <h1>RECIBO Nº ${esc(seq)}/${esc(orc.numero)}</h1>
          <div class="recibo-valor-destaque">${fmtBRL(pagamento.valor)}</div>
        </div>

        <div class="recibo-corpo">
          <p>
            Recebi de <strong>${esc(orc.cliente?.nome || '—')}</strong>${orc.cliente?.cpfCnpj ? `, portador(a) do CPF/CNPJ nº <strong>${esc(orc.cliente.cpfCnpj)}</strong>` : ''}${orc.cliente?.endereco ? `, residente em ${esc(orc.cliente.endereco)}` : ''}, a importância de
            <strong>${fmtBRL(pagamento.valor)}</strong>
            (<em>${extenso(pagamento.valor)}</em>),
            referente a <strong>${esc(refDescricao)}</strong>, do contrato Nº <strong>${esc(orc.numero)}</strong>${orc.obra?.descricao ? ` — ${esc(orc.obra.descricao)}` : ''}${orc.obra?.endereco ? `, executado em ${esc(orc.obra.endereco)}` : ''}.
          </p>

          <div class="recibo-resumo">
            <div class="recibo-resumo-row"><span>Total contratado:</span> <strong>${fmtBRL(total)}</strong></div>
            <div class="recibo-resumo-row"><span>Total recebido até esta data:</span> <strong>${fmtBRL(pagoAteAgora)}</strong></div>
            <div class="recibo-resumo-row"><span>Saldo do contrato:</span> <strong>${fmtBRL(saldoApos)}</strong></div>
          </div>

          <p>Para clareza e validade do presente, firmo o presente recibo.</p>

          <p class="recibo-local-data">Ilhéus/BA, ${esc(fmtDataExtenso(pagamento.data))}.</p>

          <div class="recibo-assinaturas">
            <div class="recibo-assinatura">
              <div class="assinatura-linha"></div>
              <div class="assinatura-nome">${esc(emp.responsavel || 'Responsável Técnico')}</div>
              <div class="assinatura-cargo">Responsável Técnico — ${esc(emp.nome || 'Sua Empresa')}</div>
              ${emp.crea ? `<div class="assinatura-cargo">${esc(emp.crea)}</div>` : ''}
            </div>
            <div class="recibo-assinatura">
              <div class="assinatura-linha"></div>
              <div class="assinatura-nome">${esc(orc.cliente?.nome || '—')}</div>
              <div class="assinatura-cargo">${orc.cliente?.cpfCnpj ? 'CPF/CNPJ ' + esc(orc.cliente.cpfCnpj) : 'Contratante'}</div>
            </div>
          </div>
        </div>

        <div class="recibo-rodape">
          ${esc(emp.nome || 'Sua Empresa')} ${emp.cnpj ? '• CNPJ ' + esc(emp.cnpj) : ''}
        </div>
      </div>
    </div>
  `;
}

// ============ LAUDOS DE MONITORAMENTO ============
function renderLaudosLista() {
  const laudos = state.laudos || [];
  // Categoria default = 'vistoria' (retrocompatível: docs antigos sem categoria viram vistoria)
  const todos = laudos.map(l => ({ ...l, categoria: l.categoria || 'vistoria' }));
  const vistorias = todos.filter(l => l.categoria === 'vistoria');
  const laudosFormais = todos.filter(l => l.categoria === 'laudo');

  const abaAtual = state.vistoriasAba || 'vistoria';
  const visiveis = abaAtual === 'vistoria' ? vistorias : laudosFormais;
  const ativos = visiveis.filter(l => l.status === 'em_andamento').sort((a, b) => (b.criadoEm || '').localeCompare(a.criadoEm || ''));
  const finalizados = visiveis.filter(l => l.status === 'finalizado').sort((a, b) => (b.criadoEm || '').localeCompare(a.criadoEm || ''));

  const rotuloPlural = abaAtual === 'vistoria' ? 'vistoria' : 'laudo';
  const rotuloPluralS = abaAtual === 'vistoria' ? 'vistorias' : 'laudos';

  return `
    <div class="stack">
      <div class="row-between flex-wrap">
        <div>
          <div class="hero-title" style="font-size: 22px;">${ICON.clipboard} Vistorias e Laudos</div>
          <div class="hero-sub">${vistorias.length} vistoria${vistorias.length === 1 ? '' : 's'} • ${laudosFormais.length} laudo${laudosFormais.length === 1 ? '' : 's'}</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="actions.novoLaudo()">${ICON.plus} Nova vistoria</button>
      </div>

      <!-- Abas -->
      <div class="vistoria-abas">
        <button class="vistoria-aba ${abaAtual === 'vistoria' ? 'ativa' : ''}" onclick="actions.vistoriasMudarAba('vistoria')">
          Vistorias <span class="vistoria-aba-count">${vistorias.length}</span>
        </button>
        <button class="vistoria-aba ${abaAtual === 'laudo' ? 'ativa' : ''}" onclick="actions.vistoriasMudarAba('laudo')">
          Laudos <span class="vistoria-aba-count">${laudosFormais.length}</span>
        </button>
      </div>

      ${visiveis.length === 0 ? `
        <div class="card empty">
          ${ICON.clipboard}
          <div class="empty-msg">Nenhuma ${rotuloPlural} ainda.<br>Toque em <strong>Nova vistoria</strong> para começar.</div>
        </div>
      ` : ''}

      ${ativos.length > 0 ? `
        <div class="card">
          <div class="card-title">Em andamento (${ativos.length})</div>
          <div class="stack-sm">${ativos.map(l => renderLaudoRow(l)).join('')}</div>
        </div>
      ` : ''}

      ${finalizados.length > 0 ? `
        <div class="card">
          <div class="card-title">Finalizad${rotuloPlural === 'vistoria' ? 'as' : 'os'} (${finalizados.length})</div>
          <div class="stack-sm">${finalizados.map(l => renderLaudoRow(l)).join('')}</div>
        </div>
      ` : ''}

      <div style="font-size: 11px; color: var(--muted); line-height: 1.6; padding: 12px; background: #F9FAFB; border-radius: 8px; border-left: 3px solid var(--accent);">
        💡 <strong>Diferença técnica entre Vistoria e Laudo:</strong><br>
        • <strong>Vistoria</strong> = registro factual de estado ("constatou-se que..."). Sem responsabilidade técnica formal pelo diagnóstico. Numeração V-001/2026.<br>
        • <strong>Laudo</strong> = documento pericial com tese técnica ("conclui-se tecnicamente que..."). Profissional ASSUME a responsabilidade. ART/RRT/TRT recomendada. Numeração L-001/2026.<br>
        Você pode <strong>converter</strong> uma vistoria em laudo a qualquer momento (botão no topo do documento).
      </div>
    </div>
  `;
}

  return `

      <!-- AÇÕES PERIGOSAS -->

        <button class="back-btn" style="color: var(--danger);" onclick="actions.excluirLaudo('${l.id}')">${ICON.trash} Excluir ${rotuloDocumento(l.categoria || 'vistoria', 'singularLower')}</button>
      </div>
    </div>
  `;
}

function renderFissuraRow(f, limite) {
  const paqAtual = paquimetroAtual(f) ?? 0;
  const classe = classificarFissura(paqAtual);
  const alarmes = alarmesFissura(f, limite);
  const leituras = f.leituras || [];
  let deltaPaq = null, deltaMed = null;
  if (leituras.length >= 2) {
    const d = calcularDeltaLeitura(f, leituras.length - 1);
    deltaPaq = d.paq;
    deltaMed = d.med;
  } else if (leituras.length === 1) {
    // primeira leitura: compara com marco zero
    const ult = leituras[0];
    const p = paquimetroDeLeitura(ult);
    const pIni = paquimetroInicialDeFissura(f);
    if (p !== null && pIni !== null) deltaPaq = p - pIni;
    const m = medidorDeLeitura(ult);
    const mIni = medidorInicialDeFissura(f);
    if (m !== null && mIni !== null) deltaMed = m - mIni;
  }
  const ultima = leituras[leituras.length - 1];
  const medAtual = ultima ? medidorDeLeitura(ultima) : medidorInicialDeFissura(f);

  return `
    <div class="fissura-row ${alarmes.length > 0 ? 'fissura-row-alarme' : ''}" onclick="actions.abrirFissura('${f.id}')">
      <div class="fissura-row-codigo" style="background: ${classe.cor};">${esc(f.codigo)}</div>
      <div class="fissura-row-info">
        <div class="fissura-row-local">${esc(f.local || '—')}</div>
        <div class="fissura-row-meta">
          <span class="fissura-classe" style="color: ${classe.cor};">● ${classe.nome}</span>
          • Paq ${paqAtual.toFixed(2)} mm
          ${deltaPaq !== null ? ` (Δ ${deltaPaq > 0 ? '+' : ''}${deltaPaq.toFixed(2)})` : ''}
          ${medAtual !== null ? ` • Med ${medAtual.toFixed(2)} mm${deltaMed !== null ? ` (Δ ${deltaMed > 0 ? '+' : ''}${deltaMed.toFixed(2)})` : ''}` : ''}
          • ${leituras.length} leitura${leituras.length === 1 ? '' : 's'}
        </div>
        ${alarmes.length > 0 ? `<div class="fissura-row-alarmes">${alarmes.map(a => `<span class="alarme-tag ${a.tipo}">${ICON.alert} ${esc(a.msg)}</span>`).join('')}</div>` : ''}
      </div>
    </div>
  `;
}

            <div style="font-size: 13px; color: ${classe.cor}; font-weight: 600;">${classe.nome} • Paquímetro: ${paqAtual.toFixed(2)} mm</div>
            ${medAtual !== null ? `<div style="font-size: 12px; color: var(--text-light); margin-top: 2px;">Medidor de fissuras: ${medAtual.toFixed(2)} mm${seloAtual ? ` • Selo: <strong>${esc(seloAtual)}</strong>` : ''}</div>` : (seloAtual ? `<div style="font-size: 12px; color: var(--text-light); margin-top: 2px;">Selo: <strong>${esc(seloAtual)}</strong></div>` : '')}
            <div style="font-size: 12px; color: var(--muted); margin-top: 2px;">Marco zero: ${fmtData(f.dataCadastro)} • Paq. inicial: ${paqIni.toFixed(2)} mm${medIni !== null ? ` • Med. inicial: ${medIni.toFixed(2)} mm` : ''}</div>

function renderLeituraRow(leitura, idx, fissura, limite) {
  const deltas = calcularDeltaLeitura(fissura, idx);
  const paq = paquimetroDeLeitura(leitura);
  const med = medidorDeLeitura(leitura);
  const dPaq = deltas.paq;
  const dMed = deltas.med;
  const alarmaPaq = paq !== null && paq > limite;
  const alarmaDeltaPaq = dPaq !== null && Math.abs(dPaq) > 0.10;
  const alarmaDeltaMed = dMed !== null && Math.abs(dMed) > 0.10;
  const alarmaSelo = leitura.estadoSelo === 'Trincado' || leitura.estadoSelo === 'Rompido';
  const seloCor = leitura.estadoSelo === 'Íntegro' ? 'var(--success)' :
                  leitura.estadoSelo === 'Recolocado' ? 'var(--info)' :
                  leitura.estadoSelo ? 'var(--danger)' : 'var(--muted)';
  const temAlarme = alarmaPaq || alarmaDeltaPaq || alarmaDeltaMed || alarmaSelo;
  const primeira = idx === 0;

  // Divergência entre paquímetro e medidor na mesma leitura
  const divergencia = (paq !== null && med !== null) ? Math.abs(paq - med) : null;
  const alarmaDiv = divergencia !== null && divergencia > 0.15;

  return `
    <div class="leitura-row ${temAlarme ? 'leitura-row-alarme' : ''}">
      <div class="row-between" style="gap: 8px; flex-wrap: wrap; align-items: flex-start;">
        <div style="flex: 1; min-width: 0;">
          <div style="font-weight: 600;">${fmtData(leitura.dataLeitura)}${primeira ? ' <span style="font-size: 10px; color: var(--muted); font-weight: 400;">(primeira leitura)</span>' : ''}</div>
          <div class="leitura-medicoes-grid">
            ${paq !== null ? `
              <div class="leitura-medicao">
                <div class="leitura-medicao-label">Paquímetro</div>
                <div class="leitura-medicao-valor" style="color: ${alarmaPaq ? 'var(--danger)' : 'var(--primary)'};">${paq.toFixed(2)} mm</div>
                ${dPaq !== null ? `<div class="leitura-medicao-delta" style="color: ${alarmaDeltaPaq ? 'var(--danger)' : 'var(--muted)'};">Δ ${dPaq > 0 ? '+' : ''}${dPaq.toFixed(2)}</div>` : ''}
              </div>
            ` : '<div class="leitura-medicao leitura-medicao-vazia"><div class="leitura-medicao-label">Paquímetro</div><div class="leitura-medicao-valor leitura-vazio">—</div></div>'}

            ${med !== null ? `
              <div class="leitura-medicao">
                <div class="leitura-medicao-label">Medidor</div>
                <div class="leitura-medicao-valor" style="color: var(--text-light);">${med.toFixed(2)} mm</div>
                ${dMed !== null ? `<div class="leitura-medicao-delta" style="color: ${alarmaDeltaMed ? 'var(--danger)' : 'var(--muted)'};">Δ ${dMed > 0 ? '+' : ''}${dMed.toFixed(2)}</div>` : ''}
              </div>
            ` : '<div class="leitura-medicao leitura-medicao-vazia"><div class="leitura-medicao-label">Medidor</div><div class="leitura-medicao-valor leitura-vazio">—</div></div>'}

            <div class="leitura-medicao">
              <div class="leitura-medicao-label">Selo</div>
              <div class="leitura-medicao-valor" style="color: ${seloCor}; font-size: 13px;">${leitura.estadoSelo ? esc(leitura.estadoSelo) : '<span class="leitura-vazio">—</span>'}</div>
            </div>
          </div>

          ${alarmaDiv ? `<div style="font-size: 11px; color: var(--danger); margin-top: 4px;">⚠ Divergência paquímetro × medidor: ${divergencia.toFixed(2)} mm</div>` : ''}

          <div style="font-size: 12px; margin-top: 4px; color: var(--muted);">
            ${Number(leitura.propagacao) > 0 ? `Propagação: ${leitura.propagacao} cm` : ''}
            ${Number(leitura.propagacao) > 0 && leitura.inspetor ? ' • ' : ''}
            ${leitura.inspetor ? `por ${esc(leitura.inspetor)}` : ''}
          </div>
          ${leitura.observacoes ? `<div style="font-size: 12px; color: var(--text-light); margin-top: 4px; font-style: italic;">${esc(leitura.observacoes)}</div>` : ''}
          ${(leitura.fotos || []).length > 0 ? `
            <div class="fotos-grid" style="margin-top: 6px;">
              ${leitura.fotos.map(foto => `<img src="${foto.data}" class="foto-thumb foto-thumb-sm" alt="Foto leitura">`).join('')}
            </div>
          ` : ''}
        </div>
        <div class="row" style="gap: 4px;">
          <button class="btn-icon-only" onclick="actions.editarLeitura('${leitura.id}')" title="Editar">${ICON.edit}</button>
          <button class="btn-icon-only" onclick="actions.excluirLeitura('${leitura.id}')" style="color: var(--danger);" title="Excluir">${ICON.trash}</button>
        </div>
      </div>
    </div>
  `;
}

}

function renderFissuraNoRelatorio(f, limite) {
  const paqAtual = paquimetroAtual(f) ?? 0;
  const classe = classificarFissura(paqAtual);
  const paqIni = paquimetroInicialDeFissura(f) ?? 0;
  const medIni = medidorInicialDeFissura(f);
  return `
    <div style="border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 10px 0; page-break-inside: avoid;">
      <div style="font-weight: 700; font-size: 13px; color: var(--primary); margin-bottom: 6px;">
        ${esc(f.codigo)} — ${esc(f.local)} (${classe.nome})
      </div>
      <table class="ficha-table" style="font-size: 11px; margin-bottom: 8px;">
        <tbody>
          <tr><td><strong>Cadastro</strong></td><td>${fmtData(f.dataCadastro)}</td><td><strong>Face</strong></td><td>${f.face === 'sup' ? 'Superior' : 'Inferior'}</td></tr>
          <tr><td><strong>Paquímetro inicial</strong></td><td>${paqIni.toFixed(2)} mm</td><td><strong>Medidor inicial</strong></td><td>${medIni !== null ? medIni.toFixed(2) + ' mm' : '—'}</td></tr>
          <tr><td><strong>Comprimento</strong></td><td>${Number(f.comprimento || 0).toFixed(2)} m</td><td><strong>Orientação</strong></td><td>${esc(f.orientacao)}</td></tr>
          <tr><td><strong>Testemunhos</strong></td><td colspan="3">${esc(f.testemunhos)}${f.seloInstalado ? ` — selo de gesso instalado${f.dataInstalacaoSelo ? ' em ' + fmtData(f.dataInstalacaoSelo) : ''}` : ''}</td></tr>
          ${f.hipoteseCausa ? `<tr><td colspan="4"><strong>Hipótese de causa:</strong> ${esc(f.hipoteseCausa)}</td></tr>` : ''}
        </tbody>
      </table>
      ${(f.leituras || []).length > 0 ? `
        <div style="font-size: 11px; font-weight: 700; margin-top: 6px;">Leituras periódicas (3 instrumentos cruzados):</div>
        <table class="ficha-table" style="font-size: 10.5px;">
          <thead><tr><th>Data</th><th>Paq. (mm)</th><th>Δ Paq.</th><th>Medidor (mm)</th><th>Δ Med.</th><th>Selo</th><th>Propag.</th><th>Inspetor</th></tr></thead>
          <tbody>
            ${f.leituras.map((leit, idx) => {
              const deltas = calcularDeltaLeitura(f, idx);
              const paq = paquimetroDeLeitura(leit);
              const med = medidorDeLeitura(leit);
              return `<tr>
                <td>${fmtData(leit.dataLeitura)}</td>
                <td>${paq !== null ? paq.toFixed(2) : '—'}</td>
                <td>${deltas.paq === null ? '—' : (deltas.paq > 0 ? '+' : '') + deltas.paq.toFixed(2)}</td>
                <td>${med !== null ? med.toFixed(2) : '—'}</td>
                <td>${deltas.med === null ? '—' : (deltas.med > 0 ? '+' : '') + deltas.med.toFixed(2)}</td>
                <td>${leit.estadoSelo ? esc(leit.estadoSelo) : '—'}</td>
                <td>${leit.propagacao || 0} cm</td>
                <td>${esc(leit.inspetor || '—')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      ` : '<div style="font-size: 11px; color: var(--muted); font-style: italic;">Sem leituras periódicas registradas.</div>'}
    </div>
  `;
}

// ============ MANUAL TÉCNICO ============
function renderManualHome() {
  const filtro = state.manualFiltro.busca.trim().toLowerCase();
  const fichas = state.manualFichas || [];

  // Aplica busca se houver
  let filtradas = fichas;
  if (filtro) {
    filtradas = fichas.filter(f => {
      const blob = [
        f.tema, f.categoria, f.resumo,
        ...(f.referencias || []),
        ...(f.tabelas || []).map(t => t.titulo + ' ' + (t.colunas || []).join(' ') + ' ' + (t.linhas || []).flat().join(' ')),
        ...(f.checklists || []).map(c => c.titulo + ' ' + (c.itens || []).join(' '))
      ].join(' ').toLowerCase();
      return blob.includes(filtro);
    });
  }

  const favoritas = (state.manualFichas || []).filter(f => f.favorito);
  const recentesIds = state.manualRecentes || [];
  const recentes = recentesIds.map(id => fichas.find(f => f.id === id)).filter(Boolean).slice(0, 6);

  const categorias = [...new Set(fichas.map(f => f.categoria))].sort();
  const contagemPorCat = {};
  categorias.forEach(c => contagemPorCat[c] = fichas.filter(f => f.categoria === c).length);

  return `
    <div class="stack">
      <div class="row-between flex-wrap" style="margin-bottom: 4px;">
        <div>
          <div class="hero-title" style="font-size: 22px;">${ICON.book} Manual Técnico</div>
          <div class="hero-sub">${fichas.length} ficha${fichas.length === 1 ? '' : 's'} • ${categorias.length} categoria${categorias.length === 1 ? '' : 's'}</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="actions.novaFichaManual()">${ICON.plus} Nova ficha</button>
      </div>

      <div class="manual-search">
        ${ICON.search}
        <input type="text" placeholder="Buscar por tema, categoria, norma..." value="${esc(state.manualFiltro.busca)}" oninput="actions.manualBusca(this.value)">
        ${filtro ? `<button class="btn-clear" onclick="actions.manualBusca('')">${ICON.x}</button>` : ''}
      </div>

      ${filtro ? `
        <div class="card">
          <div class="card-title">${ICON.search} Resultados (${filtradas.length})</div>
          ${filtradas.length === 0 ? `
            <div style="text-align: center; padding: 20px; color: var(--muted); font-size: 13px;">Nenhuma ficha encontrada com "${esc(filtro)}".</div>
          ` : `<div class="stack-sm">${filtradas.map(f => fichaRowCompact(f)).join('')}</div>`}
        </div>
      ` : `
        ${favoritas.length > 0 ? `
          <div class="card">
            <div class="card-title">${ICON.starFilled} Favoritos</div>
            <div class="stack-sm">${favoritas.map(f => fichaRowCompact(f)).join('')}</div>
          </div>
        ` : ''}

        ${recentes.length > 0 ? `
          <div class="card">
            <div class="card-title">${ICON.clock} Acessadas recentemente</div>
            <div class="stack-sm">${recentes.map(f => fichaRowCompact(f)).join('')}</div>
          </div>
        ` : ''}

        <div class="card">
          <div class="card-title">${ICON.package} Categorias</div>
          <div class="manual-cats-grid">
            ${categorias.map(c => `
              <button class="manual-cat-btn" onclick="actions.abrirCategoriaManual('${esc(c)}')">
                <div class="manual-cat-nome">${esc(c)}</div>
                <div class="manual-cat-contagem">${contagemPorCat[c]} ficha${contagemPorCat[c] === 1 ? '' : 's'}</div>
              </button>
            `).join('')}
          </div>
        </div>
      `}

      <div style="font-size: 11px; color: var(--muted); font-style: italic; padding: 12px; background: #F9FAFB; border-radius: 8px; border-left: 3px solid var(--accent);">
        ⚠ <strong>Referência rápida para consulta de campo.</strong> Não substitui a leitura da norma vigente nem a responsabilidade técnica do profissional habilitado. Versões de norma citadas podem ter sido atualizadas — verifique antes de citar em laudo formal.
      </div>
    </div>
  `;
}

function fichaRowCompact(f) {
  const estrela = f.favorito ? ICON.starFilled : ICON.star;
  return `
    <div class="row-between" style="gap: 8px; padding: 10px 12px; background: white; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: background 0.15s;" onclick="actions.abrirFichaManual('${f.id}')" onmouseover="this.style.background='#F9FAFB'" onmouseout="this.style.background='white'">
      <div style="flex: 1; min-width: 0;">
        <div style="font-weight: 600; font-size: 14px;">${esc(f.tema)}</div>
        <div style="font-size: 12px; color: var(--muted); margin-top: 2px;">${esc(f.categoria)}${f.referencias && f.referencias.length > 0 ? ' • ' + esc(f.referencias[0]) : ''}</div>
      </div>
      <button class="btn-icon-only" onclick="event.stopPropagation(); actions.toggleFavorito('${f.id}')" title="${f.favorito ? 'Remover dos favoritos' : 'Marcar como favorito'}" style="color: ${f.favorito ? 'var(--accent)' : 'var(--muted)'};">${estrela}</button>
    </div>
  `;
}

  const cat = state.manualFiltro.categoria;

  const fichas = (state.manualFichas || []).filter(f => f.categoria === cat).sort((a, b) => a.tema.localeCompare(b.tema));
  return `
    <div class="stack">
      <div class="row-between flex-wrap">
        <button class="back-btn" onclick="actions.irParaManual()">${ICON.chevronLeft} Voltar ao Manual</button>

      <div>
        <div class="hero-title" style="font-size: 22px;">${esc(cat)}</div>
        <div class="hero-sub">${fichas.length} ficha${fichas.length === 1 ? '' : 's'} nesta categoria</div>

      <div class="card">
        ${fichas.length === 0 ? `
          <div style="text-align: center; padding: 20px; color: var(--muted);">Nenhuma ficha nesta categoria ainda.</div>

}

// ============ HOME ============
function renderHome() {
  const orcs = state.orcamentos;
  const total = orcs.length;
  const aprovados = orcs.filter(o => o.status === 'aprovado').length;
  const rascunhos = orcs.filter(o => o.status === 'rascunho').length;
  const enviados = orcs.filter(o => o.status === 'enviado').length;
  const recentes = orcs.slice(0, 4);

  // Dados financeiros pra saudação contextual
  const ag = getFinanceiroAggregado();
  const fichasFav = (state.manualFichas || []).filter(f => f.favorito).length;
  const totalFichas = (state.manualFichas || []).length;
  const laudos = state.laudos || [];
  const laudosAtivos = laudos.filter(l => l.status === 'em_andamento').length;
  // Total de alarmes em laudos ativos
  let laudosComAlarme = 0;
  laudos.filter(l => l.status === 'em_andamento').forEach(l => {
    const ind = indicadoresLaudo(l);
    if (ind.acimaLimite > 0 || ind.selosRompidos > 0) laudosComAlarme++;
  });
  const emp = state.empresa || {};

  // Saudação contextual baseada no estado
  let saudacaoExtra = '';
  if (ag.atrasado > 0 || ag.nAMedir > 0) {
    const partes = [];
    if (ag.atrasado > 0) partes.push(`<strong style="color: var(--danger);">${fmtBRL(ag.atrasado)}</strong> em atraso`);
    if (ag.nAMedir > 0) partes.push(`<strong style="color: var(--accent);">${ag.nAMedir}</strong> medi${ag.nAMedir === 1 ? 'ção a fazer' : 'ções a fazer'}`);
    saudacaoExtra = `Atenção: você tem ${partes.join(' e ')}.`;
  } else if (rascunhos > 0) {
    saudacaoExtra = `Você tem <strong>${rascunhos}</strong> orçamento${rascunhos === 1 ? '' : 's'} em rascunho pra finalizar.`;
  } else if (enviados > 0) {
    saudacaoExtra = `<strong>${enviados}</strong> orçamento${enviados === 1 ? '' : 's'} enviado${enviados === 1 ? '' : 's'} aguardando aprovação do cliente.`;
  } else if (ag.areceber > 0) {
    saudacaoExtra = `Está tudo em dia. ${fmtBRL(ag.areceber)} a receber nos contratos ativos.`;
  } else {
    saudacaoExtra = `Tudo em dia. Pronto pra fechar um novo orçamento?`;
  }

  // Saudação por horário
  const hora = new Date().getHours();
  const periodo = hora < 12 ? 'Bom dia' : (hora < 18 ? 'Boa tarde' : 'Boa noite');

  // Detecta primeira execução: empresa sem nome cadastrado
  const empresaNaoCadastrada = !emp.nome || !emp.nome.trim();

  return `
    <div class="stack">

      ${empresaNaoCadastrada ? `
        <div class="card" style="background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%); border-left: 4px solid var(--accent); padding: 16px;">
          <div style="display: flex; gap: 12px; align-items: flex-start;">
            <div style="font-size: 28px;">👋</div>
            <div style="flex: 1;">
              <div style="font-weight: 700; font-size: 16px; color: #92400E; margin-bottom: 4px;">Bem-vindo ao EI Construtor!</div>
              <div style="font-size: 13px; color: #78350F; line-height: 1.5; margin-bottom: 10px;">
                Antes de gerar seu primeiro orçamento, configure os dados da sua empresa em <strong>Configurações</strong>. Eles serão usados automaticamente em todos os documentos (orçamentos, contratos, recibos, vistorias).
              </div>
              <button class="btn btn-primary btn-sm" onclick="actions.setView('config')">⚙ Configurar agora</button>
            </div>
          </div>
        </div>
      ` : ''}

      <!-- HERO: Branding + Saudação + CTA -->
      <div class="home-hero">
        <div class="home-hero-brand">
          ${logoSVG('icon-lg')}
          <div class="home-hero-titulo">EI CONSTRUTOR</div>
          <div class="home-hero-tagline">Sistema de gestão de obras</div>
        </div>

        <div class="home-hero-saudacao">
          <div class="home-hero-ola">${periodo}, Construtor!</div>
          <div class="home-hero-contexto">${saudacaoExtra}</div>
        </div>

        <button class="home-cta-principal" onclick="actions.novoOrcamento()">
          ${ICON.plus}
          <span>NOVO ORÇAMENTO</span>
        </button>
      </div>

      <!-- CARD FINANCEIRO PREMIUM -->
      ${ag.nContratos > 0 ? renderHomeFinanceiro() : ''}

      <!-- GRID DE ACESSOS RÁPIDOS -->
      <div class="home-acessos-grid">
        <button class="home-acesso-btn" onclick="actions.setView('lista')">
          <div class="home-acesso-icone home-acesso-icone-azul">${ICON.file}</div>
          <div class="home-acesso-nome">Histórico</div>
          <div class="home-acesso-info">${total} orçamento${total === 1 ? '' : 's'}</div>
          ${aprovados > 0 ? `<div class="home-acesso-badge">${aprovados} aprovado${aprovados === 1 ? '' : 's'}</div>` : ''}
        </button>

        <button class="home-acesso-btn" onclick="actions.irParaFinanceiro()">
          <div class="home-acesso-icone home-acesso-icone-verde">${ICON.check}</div>
          <div class="home-acesso-nome">Financeiro</div>
          <div class="home-acesso-info">${ag.nContratos} contrato${ag.nContratos === 1 ? '' : 's'} ativo${ag.nContratos === 1 ? '' : 's'}</div>
          ${(ag.atrasado > 0 || ag.nAMedir > 0) ? `<div class="home-acesso-badge home-acesso-badge-alerta">${ag.nAtrasadas + ag.nAMedir} pendência${(ag.nAtrasadas + ag.nAMedir) === 1 ? '' : 's'}</div>` : ''}
        </button>

        <button class="home-acesso-btn" onclick="actions.irParaVistorias()">
          <div class="home-acesso-icone home-acesso-icone-vermelho">${ICON.clipboard}</div>
          <div class="home-acesso-nome">Vistorias</div>
          <div class="home-acesso-info">${laudosAtivos} em andamento</div>
          ${laudosComAlarme > 0 ? `<div class="home-acesso-badge home-acesso-badge-alerta">${laudosComAlarme} com alerta</div>` : ''}
        </button>

        <button class="home-acesso-btn" onclick="actions.irParaManual()">
          <div class="home-acesso-icone home-acesso-icone-laranja">${ICON.book}</div>
          <div class="home-acesso-nome">Manual Técnico</div>
          <div class="home-acesso-info">${totalFichas} ficha${totalFichas === 1 ? '' : 's'}</div>
          ${fichasFav > 0 ? `<div class="home-acesso-badge">${fichasFav} ★ favorita${fichasFav === 1 ? '' : 's'}</div>` : ''}
        </button>

function renderHomeRecenteCard(o) {
  const total = calcTotalOrc(o);
  const statusLabel = { rascunho: 'Rascunho', enviado: 'Enviado', aprovado: 'Aprovado', recusado: 'Recusado' }[o.status] || o.status;
  return `
    <div class="home-recente-row" onclick="actions.abrirOrc('${o.id}')">
      <div class="home-recente-status-bar status-${o.status}"></div>
      <div class="home-recente-info">
        <div class="home-recente-cliente">${esc(o.cliente?.nome || '—')}</div>
        <div class="home-recente-meta">Nº ${esc(o.numero)} • ${fmtData(o.data)}</div>

      <div class="home-recente-valor">

      </div>

  `;
}

function renderHomeFinanceiro() {
  const ag = getFinanceiroAggregado();
  if (ag.nContratos === 0) return '';
  const pct = ag.contratado > 0 ? Math.round(ag.recebido / ag.contratado * 100) : 0;
  const temPendencia = ag.atrasado > 0 || ag.nAMedir > 0;
  return `
    <div class="card fin-home-card" onclick="actions.irParaFinanceiro()" style="cursor: pointer;">
      <div class="row-between mb-3" style="align-items: center;">
        <div class="card-title" style="margin: 0;">${ICON.check} Financeiro</div>
        <div style="font-size: 12px; color: var(--muted);">${ag.nContratos} contrato${ag.nContratos === 1 ? '' : 's'} ativo${ag.nContratos === 1 ? '' : 's'} →</div>
      </div>
      <div class="fin-home-grid">
        <div>
          <div style="font-size: 12px; color: var(--muted);">Recebido</div>
          <div style="font-weight: 700; color: var(--success); font-size: 16px;">${fmtBRL(ag.recebido)}</div>
        </div>
        <div>
          <div style="font-size: 12px; color: var(--muted);">A receber</div>
          <div style="font-weight: 700; color: var(--secondary); font-size: 16px;">${fmtBRL(ag.areceber)}</div>
        </div>
        ${temPendencia ? `
        <div>
          <div style="font-size: 12px; color: var(--danger);">Pendências</div>
          ${ag.atrasado > 0 ? `<div style="font-weight: 700; color: var(--danger); font-size: 16px;">${fmtBRL(ag.atrasado)}</div>` : ''}
          <div style="font-size: 11px; color: var(--danger);">
            ${ag.nAtrasadas > 0 ? `${ag.nAtrasadas} atrasada${ag.nAtrasadas === 1 ? '' : 's'}` : ''}
            ${ag.nAtrasadas > 0 && ag.nAMedir > 0 ? ' • ' : ''}
            ${ag.nAMedir > 0 ? `${ag.nAMedir} a medir` : ''}
          </div>
        </div>
        ` : `
        <div>
          <div style="font-size: 12px; color: var(--muted);">Progresso</div>
          <div style="font-weight: 700; color: var(--primary); font-size: 16px;">${pct}%</div>
        </div>
        `}
      </div>
    </div>
  `;
}

function orcRow(o) {
  const sub = (o.itens || []).reduce((s, i) => s + Number(i.quantidade || 0) * Number(i.valorUnitario || 0), 0);
  const total = sub - calcDesconto(sub, o.desconto);
  return `
    <button class="orc-row" onclick="actions.abrirOrc('${o.id}')">
      <div class="row-between">
        <div style="flex: 1; min-width: 0;">
          <div class="orc-row-top">

            <span class="badge badge-${o.status || 'rascunho'}">${o.status || 'rascunho'}</span>
          </div>
          <div class="orc-cliente">${esc(o.cliente?.nome || '(sem cliente)')}</div>
          <div class="orc-obra">${esc(o.obra?.descricao || o.obra?.endereco || '')}</div>

        <div style="text-align: right;">
          <div class="orc-total">${fmtBRL(total)}</div>

        </div>
      </div>

    </div>

}

function renderListaConteudoHTML() {
  const f = state.listaFiltro;
  const filtrados = state.orcamentos.filter(o => {
    if (f.status !== 'todos' && o.status !== f.status) return false;
    if (f.busca) {
      const b = f.busca.toLowerCase();
      return (o.numero || '').toLowerCase().includes(b) || (o.cliente?.nome || '').toLowerCase().includes(b) || (o.obra?.descricao || '').toLowerCase().includes(b);
    }
    return true;
  });
  if (filtrados.length === 0) return `<div class="card"><div class="empty">${ICON.file}<div class="empty-msg">Nenhum orçamento encontrado.</div></div></div>`;
  return `<div class="stack-sm">${filtrados.map(orcRow).join('')}</div>`;
}

function renderListaConteudo() {
  const el = document.getElementById('lista-conteudo');
  if (el) el.innerHTML = renderListaConteudoHTML();
}

// ============ ESCOPO POR MODO ============
function renderEscopoModo(o, modo) {
  const sumIt = (its) => its.reduce((s, i) => s + Number(i.quantidade || 0) * Number(i.valorUnitario || 0), 0);
  const servicos = o.itens.filter(i => (i.tipo || 'servico') === 'servico');
  const materiais = o.itens.filter(i => (i.tipo || 'servico') === 'material');
  const subS = sumIt(servicos);
  const subM = sumIt(materiais);
  const temAmbos = servicos.length > 0 && materiais.length > 0;
  const secao = (nome) => temAmbos ? `<div class="secao-tipo">${nome}</div>` : '';
  const subRow = (nome, val, cols) => temAmbos ? `<tr class="subtotal-row"><td colspan="${cols}" class="text-right strong">Subtotal ${nome}</td><td class="text-right strong">${fmtBRL(val)}</td></tr>` : '';

  if (modo === 'detalhado') {
    const tabela = (itens, nome, sub) => `${secao(nome)}<table class="table"><thead><tr><th style="width: 30px;">#</th><th>Descrição</th><th style="width: 60px;" class="text-center">Un.</th><th style="width: 70px;" class="text-right">Qtd</th><th style="width: 90px;" class="text-right">R$ Unit.</th><th style="width: 100px;" class="text-right">R$ Total</th></tr></thead><tbody>${itens.map((it, idx) => `<tr><td>${idx + 1}</td><td>${esc(it.descricao)}</td><td class="text-center">${esc(it.unidade)}</td><td class="text-right">${fmtNum(it.quantidade)}</td><td class="text-right">${fmtBRL(it.valorUnitario)}</td><td class="text-right strong">${fmtBRL(Number(it.quantidade || 0) * Number(it.valorUnitario || 0))}</td></tr>`).join('')}${subRow(nome, sub, 5)}</tbody></table>`;
    return (servicos.length ? tabela(servicos, 'SERVIÇOS', subS) : '') + (materiais.length ? tabela(materiais, 'MATERIAIS', subM) : '');
  }

  if (modo === 'resumido') {
    const tabela = (itens, nome, sub) => `${secao(nome)}<table class="table"><thead><tr><th style="width: 30px;">#</th><th>Descrição</th><th style="width: 120px;" class="text-right">Valor</th></tr></thead><tbody>${itens.map((it, idx) => `<tr><td>${idx + 1}</td><td>${esc(it.descricao)}</td><td class="text-right strong">${fmtBRL(Number(it.quantidade || 0) * Number(it.valorUnitario || 0))}</td></tr>`).join('')}${subRow(nome, sub, 2)}</tbody></table>`;
    return (servicos.length ? tabela(servicos, 'SERVIÇOS', subS) : '') + (materiais.length ? tabela(materiais, 'MATERIAIS', subM) : '');
  }

  if (modo === 'categoria') {
    const tabelaCat = (itens, nome, sub) => {
      const grupos = {};
      itens.forEach(it => { const cat = it.categoria || 'Outros'; grupos[cat] = (grupos[cat] || 0) + Number(it.quantidade || 0) * Number(it.valorUnitario || 0); });
      const entries = Object.entries(grupos);
      return `${secao(nome)}<table class="table table-cat"><thead><tr><th>Etapa / Categoria</th><th style="width: 140px;" class="text-right">Valor</th></tr></thead><tbody>${entries.map(([cat, val]) => `<tr><td>${esc(cat)}</td><td class="text-right strong">${fmtBRL(val)}</td></tr>`).join('')}${subRow(nome, sub, 1)}</tbody></table>`;
    };
    return (servicos.length ? tabelaCat(servicos, 'SERVIÇOS', subS) : '') + (materiais.length ? tabelaCat(materiais, 'MATERIAIS', subM) : '');
  }

  if (modo === 'unico') {
    const texto = `<div class="doc-unico">Execução integral dos serviços conforme escopo descrito${o.obra?.descricao ? ' — <strong>' + esc(o.obra.descricao) + '</strong>' : ''}, em conformidade com as especificações técnicas, normas ABNT e Normas Regulamentadoras aplicáveis.</div>`;
    if (!temAmbos) return texto;
    return `${texto}<div class="doc-totais" style="margin-top: 12px;"><div class="doc-totais-row"><span>Subtotal Serviços (mão de obra):</span><span>${fmtBRL(subS)}</span></div><div class="doc-totais-row"><span>Subtotal Materiais:</span><span>${fmtBRL(subM)}</span></div></div>`;
  }
  return '';
}

function renderDocTotais(subtotal, descontoVal, total, desc) {
  if (descontoVal > 0) {
    return `
      <div class="doc-totais">
        <div class="doc-totais-row subtotal"><span>Subtotal:</span><span>${fmtBRL(subtotal)}</span></div>
        <div class="doc-totais-row desconto"><span>Desconto${desc.tipo === 'pct' ? ' (' + (desc.valor || 0) + '%)' : ''}:</span><span>- ${fmtBRL(descontoVal)}</span></div>
        <div class="doc-totais-row final"><span>VALOR TOTAL:</span><span>${fmtBRL(total)}</span></div>
      </div>
    `;
  }
  return `<div class="doc-totais"><div class="doc-totais-row final solo"><span>VALOR TOTAL:</span><span>${fmtBRL(total)}</span></div></div>`;
}

// ============ CONTRATO ============

      <div class="print-page">
        ${renderDocHeader(emp)}

        <div class="doc-ident">
          <div class="doc-ident-box">
            <div><span class="strong">CONTRATO Nº ${esc(o.numero)}</span></div>

        <div class="doc-title"><h1>CONTRATO DE PRESTAÇÃO DE SERVIÇOS<br>DE CONSTRUÇÃO CIVIL — ${tipoLabel}</h1></div>

        <div class="contract-text">
          <h2>QUALIFICAÇÃO DAS PARTES</h2>

          <p><strong>CONTRATANTE:</strong> ${esc((o.cliente.nome || '_____________________').toUpperCase())}${o.cliente.cpfCnpj ? ', inscrito(a) no CPF/CNPJ sob nº ' + esc(o.cliente.cpfCnpj) : ''}${o.cliente.endereco ? ', residente e domiciliado(a) à ' + esc(o.cliente.endereco) : ''}${o.cliente.telefone ? ', telefone ' + esc(o.cliente.telefone) : ''}.</p>

          <p><strong>CONTRATADO:</strong> ${esc(emp.nome)}, pessoa jurídica de direito privado, com sede na ${esc(emp.endereco)}, inscrita no CNPJ sob nº ${esc(emp.cnpj)}, neste ato representada por ${esc((emp.responsavel || '').toUpperCase())}, portador do CPF nº ${esc(emp.cpfRepresentante)}, na qualidade de sócio-administrador.</p>

          <div class="preambulo">
            As partes acima identificadas têm, entre si, justo e acordado o presente Contrato de Prestação de Serviços de Construção Civil — ${tipoLabel.replace('CONTRATO DE PRESTAÇÃO DE SERVIÇOS DE CONSTRUÇÃO CIVIL — ', '')}, regido pelas cláusulas abaixo, pelo Código Civil Brasileiro (Lei nº 10.406/2002), em especial os artigos 421 a 425 e 610 a 626, pelas Normas Técnicas Brasileiras (ABNT), Normas Regulamentadoras aplicáveis e demais legislações pertinentes.
          </div>

          <h3>CLÁUSULA 1ª — DO OBJETO</h3>
          <p>1.1. O CONTRATADO executará ${tipo === 'mao_obra' ? 'exclusivamente os serviços de MÃO DE OBRA' : 'os serviços de construção civil, incluindo o fornecimento de materiais e a mão de obra'} referentes ao objeto a seguir descrito, em conformidade com o Orçamento Nº ${esc(o.numero)}${o.data ? ' de ' + fmtData(o.data) : ''}, parte integrante deste contrato:</p>
          ${o.obra.descricao ? `<p><strong>Descrição da obra:</strong> ${esc(o.obra.descricao)}</p>` : ''}

          <h3>CLÁUSULA 5.1 — DA ENTRADA</h3>
          <p>Na assinatura do presente contrato, a CONTRATANTE efetuará pagamento da 1ª parcela correspondente a ${entradaPct}% do valor global, no montante de <strong>${fmtBRL(entradaVal)}</strong>, via PIX, para liberação imediata do CONTRATADO no canteiro de obras.</p>

          <h3>CLÁUSULA 5.2 — DAS MEDIÇÕES E PAGAMENTOS INTERMEDIÁRIOS</h3>
          <p>Durante toda a vigência do contrato, as medições intermediárias seguirão ciclo quinzenal fixo, conforme as seguintes datas-base:</p>
          <ul>
            <li><strong>Dia 14 de cada mês</strong> — leitura e medição dos serviços executados;</li>
            <li><strong>Dia 15 de cada mês</strong> — pagamento da parcela correspondente;</li>
            <li><strong>Dia 29 de cada mês</strong> — leitura e medição dos serviços executados;</li>
            <li><strong>Dia 30 de cada mês</strong> — pagamento da parcela correspondente.</li>
          </ul>
          <p>Caso a data de pagamento (dia 15 ou 30) coincida com sábado, domingo ou feriado, o pagamento será efetuado no primeiro dia útil seguinte.</p>
          <p>Os pagamentos serão proporcionais ao percentual efetivamente executado da obra até cada data de medição, considerando exclusivamente os serviços já concluídos e atestados.</p>
          <p>As medições poderão ser realizadas mediante vistoria presencial, registros fotográficos, vídeos, relatórios técnicos e conferência entre as partes.</p>

          <h3>CLÁUSULA 5.3 — DO SALDO FINAL</h3>
          <p>Na conclusão integral e satisfatória de TODOS os serviços contratados, será realizado levantamento físico-financeiro final da obra, efetuando-se o pagamento do saldo remanescente correspondente aos serviços executados e ainda não quitados.</p>
          <p><strong>IMPORTANTE:</strong> O CONTRATADO fará jus ao pagamento do saldo final TÃO LOGO a obra seja concluída, <strong>INDEPENDENTEMENTE DA DATA PREVISTA</strong>. Caso os serviços sejam finalizados antes do prazo estimado, a CONTRATANTE deverá efetuar o pagamento do saldo remanescente em até 02 (dois) dias úteis contados da conclusão atestada, sem necessidade de aguardar qualquer data predeterminada.</p>

          <h3>CLÁUSULA 5.4 — DO ATRASO DE PAGAMENTO</h3>
          <p>Pagamentos realizados APÓS o vencimento estarão sujeitos a:</p>

            <li>Multa moratória de 2% sobre o valor não pago;</li>
            <li>Juros de mora de 1% ao mês (pro rata die);</li>

          <p>O inadimplemento autoriza o CONTRATADO a suspender imediatamente os serviços até regularização financeira, sem prejuízo da prorrogação automática do prazo contratual. Após 10 (dez) dias de atraso, o CONTRATADO poderá rescindir o contrato e requerer perdas e danos.</p>

          <h3>CLÁUSULA 6ª — DO PRAZO DE EXECUÇÃO</h3>
          <p><strong>Início da Obra:</strong> ${fmtData(dataInicio)}</p>
          <p><strong>Prazo Estimado:</strong> ${esc(o.prazoExecucao || '___')} (${esc(o.prazoExecucao || '___')}) dias corridos, contados do recebimento do sinal de entrada e da liberação do local da obra pela CONTRATANTE.</p>

            <li>Atraso no fornecimento de ${tipo === 'mao_obra' ? 'materiais' : 'projetos, licenças ou infraestrutura'} pela CONTRATANTE;</li>
            <li>Modificações ou alterações solicitadas pela CONTRATANTE;</li>
            <li>Chuvas intensas, vendavais ou condições climáticas adversas;</li>
            <li>Impossibilidade técnica de concretagem por condições climáticas;</li>
            <li>Interrupções por questões de segurança ou força maior;</li>
            <li>Necessidade de aditivo contratual.</li>
          </ul>
          <p>Tais ocorrências não gerarão penalidade, multa ou responsabilidade ao CONTRATADO.</p>

          <h3>CLÁUSULA 6.1 — DA GARANTIA DOS SERVIÇOS</h3>
          <p>O CONTRATADO garante os serviços executados nos limites legais aplicáveis (art. 618 do Código Civil), restringindo-se exclusivamente à qualidade de execução dos serviços realizados${tipo === 'completa' ? ' e dos materiais empregados conforme suas especificações originais' : ''}.</p>

            ${tipo === 'mao_obra' ? '<li>Materiais fornecidos pela CONTRATANTE (responsabilidade do fornecedor/marca);</li>' : '<li>Materiais ou componentes para os quais haja garantia direta do fabricante/fornecedor;</li>'}

            <li>Intervenções realizadas por terceiros após a entrega;</li>
            <li>Ausência de manutenção preventiva e corretiva;</li>

          <h3>CLÁUSULA 7ª — DA RESCISÃO</h3>

          <p><strong>Parágrafo 1º:</strong> Se a CONTRATANTE rescindir o contrato sem justificativa legal, deverá efetuar o pagamento proporcional de TODOS os serviços já executados até a data da rescisão, em até 05 (cinco) dias úteis.</p>
          <p><strong>Parágrafo 2º:</strong> Se o CONTRATADO rescindir sem motivo justificável, responderá proporcionalmente pelos prejuízos comprovadamente causados à CONTRATANTE.</p>

          <h3>CLÁUSULA 8ª — DA LIMPEZA E MANEJO DE ENTULHO</h3>
          ${tipo === 'mao_obra' ? `

          <h3>CLÁUSULA 9ª — DA SEGURANÇA DO TRABALHO</h3>

function renderCatalogoListHTML() {
  const f = state.catalogoFiltro;
  const tipoFiltro = f.tipo || 'todos';
  const filtrados = state.catalogo.filter(i => {
    if (tipoFiltro !== 'todos' && (i.tipo || 'servico') !== tipoFiltro) return false;
    if (f.cat !== 'todas' && i.cat !== f.cat) return false;
    if (f.busca) {
      const b = f.busca.toLowerCase();
      return i.desc.toLowerCase().includes(b) || i.cat.toLowerCase().includes(b);
    }
    return true;
  });
  return `
    <div class="text-xs text-muted" style="padding: 0 4px 8px;">${filtrados.length} item(ns)</div>
    <div class="stack-sm">
      ${filtrados.map(it => {
        const isMat = (it.tipo || 'servico') === 'material';
        return `
        <div class="card" style="padding: 12px; display: flex; align-items: center; gap: 12px;">
          <div style="flex: 1; min-width: 0;">
            <div class="cat-categoria">${esc(it.cat)}${isMat ? ' <span style="color: var(--info);">• MATERIAL</span>' : ''}</div>
            <div class="cat-desc">${esc(it.desc)}</div>
            <div class="cat-unidade">Unidade: ${esc(it.un)}</div>
          </div>
          <div class="price-tag">${fmtBRL(it.val)}</div>
          <div class="item-actions">
            <button class="item-action" onclick="actions.editarItemCatalogo('${it.id}')">${ICON.edit}</button>
            <button class="item-action danger" onclick="actions.excluirItemCatalogo('${it.id}')">${ICON.trash}</button>
          </div>
        </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderCatalogoList() {
  const el = document.getElementById('catalogo-list');
  if (el) el.innerHTML = renderCatalogoListHTML();
}

// Inicializa o canvas de assinatura (touch + mouse). Chamada após o modal entrar no DOM.
function setupSignatureCanvas() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#0F1E33';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false;
  let lastX = 0, lastY = 0;
  // Marca que o canvas teve algum desenho (pra validar no salvar)
  canvas._temDesenho = false;

  function getCoords(e) {
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;
    if (e.touches && e.touches[0]) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
    else if (e.changedTouches && e.changedTouches[0]) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; }
    else { clientX = e.clientX; clientY = e.clientY; }
    const x = (clientX - rect.left) * canvas.width / rect.width;
    const y = (clientY - rect.top) * canvas.height / rect.height;
    return { x, y };
  }
  function start(e) {
    e.preventDefault();
    drawing = true;
    const c = getCoords(e);
    lastX = c.x; lastY = c.y;
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const c = getCoords(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(c.x, c.y);
    ctx.stroke();
    lastX = c.x; lastY = c.y;
    canvas._temDesenho = true;
  }
  function stop(e) { if (e) e.preventDefault(); drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop, { passive: false });
}
