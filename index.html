  const fissura = state.fissuraAtual;
  const limite = state.laudoAtual ? limiteCAA(state.laudoAtual.dadosObra?.caa) : 0.30;

  const paqNum = (d.paquimetro !== '' && d.paquimetro != null) ? Number(d.paquimetro) : null;
  const medNum = (d.medidor !== '' && d.medidor != null) ? Number(d.medidor) : null;
  const classe = (paqNum !== null && paqNum > 0) ? classificarFissura(paqNum) : null;
  const acimaLimite = paqNum !== null && paqNum > limite;

  // Calcula deltas em tempo real comparando com a leitura anterior (ou marco zero se primeira)
  let prevPaq = null, prevMed = null;
  if (fissura && fissura.leituras && fissura.leituras.length > 0) {
    const arr = fissura.leituras;
    let prevLeitura = null;
    if (d.id) {
      const idx = arr.findIndex(l => l.id === d.id);
      if (idx > 0) prevLeitura = arr[idx - 1];
    } else {
      prevLeitura = arr[arr.length - 1];
    }
    if (prevLeitura) {
      prevPaq = paquimetroDeLeitura(prevLeitura);
      prevMed = medidorDeLeitura(prevLeitura);
    }
  }
  const paqRef = prevPaq !== null ? prevPaq : (fissura ? paquimetroInicialDeFissura(fissura) : null);
  const medRef = prevMed !== null ? prevMed : (fissura ? medidorInicialDeFissura(fissura) : null);

  const dPaq = (paqNum !== null && paqRef !== null) ? (paqNum - paqRef) : null;
  const dMed = (medNum !== null && medRef !== null) ? (medNum - medRef) : null;
  const dPaqAlerta = dPaq !== null && Math.abs(dPaq) > 0.10;
  const dMedAlerta = dMed !== null && Math.abs(dMed) > 0.10;

  const divergencia = (paqNum !== null && medNum !== null) ? Math.abs(paqNum - medNum) : null;
  const divAlerta = divergencia !== null && divergencia > 0.15;

  return `
    <div class="modal-overlay" onclick="actions.fecharModal()">
      <div class="modal modal-wide" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-title">${d.id ? 'Editar leitura' : 'Nova leitura periódica'}</div>
          <button class="modal-close" onclick="actions.fecharModal()">${ICON.x}</button>
        </div>
        <div class="modal-body">
          ${fissura ? `
            <div style="background: #F9FAFB; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; font-size: 13px;">
              <strong>${esc(fissura.codigo)}</strong> — ${esc(fissura.local)}<br>
              <span style="font-size: 12px; color: var(--muted);">
                Marco zero: paquímetro ${(paquimetroInicialDeFissura(fissura) ?? 0).toFixed(2)} mm${medidorInicialDeFissura(fissura) !== null ? ` • medidor ${medidorInicialDeFissura(fissura).toFixed(2)} mm` : ''} • Limite NBR: ${limite.toFixed(2)} mm
              </span>
            </div>
          ` : ''}

          <div class="field">
            <label>Data da leitura <span class="req">*</span></label>
            <input type="date" value="${esc(d.dataLeitura)}" oninput="actions.updateLeituraForm('dataLeitura', this.value)">
          </div>

          <!-- ============ MEDIÇÕES (3 instrumentos) ============ -->
          <div class="medicoes-bloco">
            <div class="medicoes-titulo">📏 Medições desta leitura</div>
            <div class="medicoes-sub">Preencha ao menos UM dos 3 instrumentos. O paquímetro é o de referência da NBR (largura absoluta).</div>

            <div class="row" style="gap: 8px; margin-top: 10px;">
              <div class="field" style="flex: 1;">
                <label>Paquímetro (mm)</label>
                <input type="number" step="0.01" min="0" placeholder="0.00" value="${esc(d.paquimetro)}" oninput="actions.updateLeituraForm('paquimetro', this.value); render();">
                <div class="medicoes-instrumento-label">Largura absoluta</div>
                ${classe ? `<div style="font-size: 11px; margin-top: 4px; color: ${acimaLimite ? 'var(--danger)' : classe.cor}; font-weight: 600;">${acimaLimite ? '⚠ ACIMA DO LIMITE • ' : '● '}${classe.nome}</div>` : ''}
                ${dPaq !== null ? `<div style="font-size: 11px; margin-top: 4px; color: ${dPaqAlerta ? 'var(--danger)' : 'var(--muted)'}; font-weight: 600;">Δ ${dPaq > 0 ? '+' : ''}${dPaq.toFixed(2)} mm${dPaqAlerta ? ' ⚠' : ''}</div>` : ''}
              </div>
              <div class="field" style="flex: 1;">
                <label>Medidor de fissuras (mm)</label>
                <input type="number" step="0.01" min="0" placeholder="0.00" value="${esc(d.medidor)}" oninput="actions.updateLeituraForm('medidor', this.value); render();">
                <div class="medicoes-instrumento-label">Deslocamento na régua/comparador</div>
                ${dMed !== null ? `<div style="font-size: 11px; margin-top: 4px; color: ${dMedAlerta ? 'var(--danger)' : 'var(--muted)'}; font-weight: 600;">Δ ${dMed > 0 ? '+' : ''}${dMed.toFixed(2)} mm${dMedAlerta ? ' ⚠' : ''}</div>` : ''}
              </div>
            </div>

            ${divAlerta ? `<div style="font-size: 11px; color: var(--danger); margin-top: 8px; padding: 6px 10px; background: #FEE2E2; border-radius: 6px;">⚠ Divergência entre paquímetro e medidor: ${divergencia.toFixed(2)} mm > 0,15 mm — verifique calibração do instrumento.</div>` : ''}

            <div class="row" style="gap: 8px; margin-top: 10px;">
              <div class="field" style="flex: 1; margin: 0;">
                <label>Estado do selo de gesso</label>
                <select onchange="actions.updateLeituraForm('estadoSelo', this.value)">
                  <option value="" ${!d.estadoSelo ? 'selected' : ''}>— Não verificado —</option>
                  ${ESTADOS_SELO.map(e => `<option value="${esc(e)}" ${d.estadoSelo === e ? 'selected' : ''}>${esc(e)}</option>`).join('')}
                </select>
                <div class="medicoes-instrumento-label">Verificação qualitativa da atividade</div>
              </div>
              <div class="field" style="flex: 1; margin: 0;">
                <label>Propagação (cm)</label>
                <input type="number" step="0.1" min="0" value="${esc(d.propagacao)}" oninput="actions.updateLeituraForm('propagacao', this.value)">
                <div class="medicoes-instrumento-label">Aumento de comprimento</div>
              </div>
            </div>
          </div>
          <!-- /MEDIÇÕES -->

          <div class="field">
            <label>Comprimento atual (m)</label>
            <input type="number" step="0.01" min="0" value="${esc(d.comprimento)}" oninput="actions.updateLeituraForm('comprimento', this.value)">
          </div>

          <div class="field">
            <label>Inspetor</label>
            <input type="text" value="${esc(d.inspetor)}" oninput="actions.updateLeituraForm('inspetor', this.value)">
          </div>

          <div class="field">
            <label>Observações</label>
            <textarea rows="2" placeholder="Ex: Visita após chuva forte, selo trincado..." oninput="actions.updateLeituraForm('observacoes', this.value)">${esc(d.observacoes)}</textarea>
          </div>

          <div class="field">
            <label>Fotos da leitura (${(d.fotos || []).length})</label>
            <input type="file" accept="image/*" capture="environment" multiple onchange="actions.adicionarFotoLeitura(this)">
            ${(d.fotos || []).length > 0 ? `
              <div class="fotos-grid" style="margin-top: 8px;">
                ${d.fotos.map(foto => `
                  <div class="foto-preview">
                    <img src="${foto.data}" alt="Leitura">
                    <button class="foto-remover" onclick="actions.removerFotoLeitura('${foto.id}')">${ICON.x}</button>
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>

          <div class="row" style="gap: 8px; margin-top: 16px;">
            <button class="btn btn-ghost" onclick="actions.fecharModal()" style="flex: 1;">Cancelar</button>
            <button class="btn btn-primary" onclick="actions.salvarLeitura()" style="flex: 2;">${ICON.check} Registrar leitura</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function modalRegistrarPagamento() {
  const d = state.modal.data;
  const orc = state.orcamentos.find(o => o.id === d.orcId);
  const parcela = orc ? (orc.parcelas || []).find(p => p.id === d.parcelaId) : null;
  if (!orc || !parcela) return '';
  const ehEntrada = parcela.tipo === 'entrada';
  const pagoAnterior = parcelaTotalPago(parcela);
  const valorAtual = Number(d.valor) || 0;

  // Pra ENTRADA: contexto da própria parcela (tem teto)
  // Pra MEDIÇÃO: contexto do contrato inteiro (sem teto na parcela, teto no total)
  const totalContrato = calcTotalOrc(orc);
  const pagoContrato = (orc.parcelas || []).reduce((s, p) => s + parcelaTotalPago(p), 0);
  const saldoContrato = round2(Math.max(0, totalContrato - pagoContrato));
  const saldoContratoApos = round2(saldoContrato - valorAtual);

  const previsto = Number(parcela.valorPrevisto || 0);
  const saldoEntrada = ehEntrada ? parcelaSaldo(parcela) : 0;
  const saldoEntradaApos = round2(saldoEntrada - valorAtual);

  const titulo = ehEntrada
    ? 'Registrar pagamento da entrada'
    : (pagoAnterior > 0 ? 'Adicionar pagamento à medição' : 'Registrar medição');

  // Bloco de contexto
  let contexto;
  if (ehEntrada) {
    contexto = `
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; font-size: 13px;">
        <div><span style="color: var(--muted);">Previsto:</span> <strong>${fmtBRL(previsto)}</strong></div>
        <div><span style="color: var(--muted);">Já pago:</span> <strong style="color: var(--success);">${fmtBRL(pagoAnterior)}</strong></div>
        <div><span style="color: var(--muted);">Saldo:</span> <strong style="color: var(--secondary);">${fmtBRL(saldoEntrada)}</strong></div>
        <div><span style="color: var(--muted);">Vencimento:</span> <strong>${fmtData(parcela.dataPrevista) || '—'}</strong></div>
      </div>
    `;
  } else {
    contexto = `
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; font-size: 13px;">
        <div><span style="color: var(--muted);">Total do contrato:</span> <strong>${fmtBRL(totalContrato)}</strong></div>
        <div><span style="color: var(--muted);">Já recebido:</span> <strong style="color: var(--success);">${fmtBRL(pagoContrato)}</strong></div>
        <div><span style="color: var(--muted);">Saldo do contrato:</span> <strong style="color: var(--secondary);">${fmtBRL(saldoContrato)}</strong></div>
        <div><span style="color: var(--muted);">Leitura:</span> <strong>${fmtData(parcela.dataLeitura) || fmtData(parcela.dataPrevista) || '—'}</strong></div>
      </div>
      ${pagoAnterior > 0 ? `<div style="margin-top: 8px; font-size: 12px; color: var(--muted);">Esta medição já tem ${fmtBRL(pagoAnterior)} registrado(s).</div>` : ''}
    `;
  }

  // Dica abaixo do campo de valor
  let dica = '';
  if (ehEntrada) {
    if (saldoEntradaApos > 0.01) dica = `Restará ${fmtBRL(saldoEntradaApos)} da entrada.`;
    else if (Math.abs(saldoEntradaApos) <= 0.01) dica = `✓ Entrada ficará quitada.`;
    else dica = `⚠ Valor maior que o saldo da entrada (sobra ${fmtBRL(-saldoEntradaApos)}).`;
  } else {
    if (valorAtual <= 0) dica = `Digite o valor apurado nesta quinzena (laje custou mais, elétrica custou menos — você define agora).`;
    else if (saldoContratoApos > 0.01) dica = `Restará ${fmtBRL(saldoContratoApos)} do contrato após este pagamento.`;
    else if (Math.abs(saldoContratoApos) <= 0.01) dica = `✓ Contrato ficará quitado com este pagamento.`;
    else dica = `⚠ Valor ultrapassa o saldo do contrato em ${fmtBRL(-saldoContratoApos)}.`;
  }
  const dicaCor = (ehEntrada ? saldoEntradaApos < -0.01 : saldoContratoApos < -0.01) ? 'var(--danger)' : 'var(--muted)';

  return `
    <div class="modal-overlay" onclick="actions.fecharModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-title">${titulo}</div>
          <button class="modal-close" onclick="actions.fecharModal()">${ICON.x}</button>
        </div>
        <div class="modal-body">
          <div class="card" style="background: #F9FAFB; padding: 12px; margin-bottom: 16px;">
            <div style="font-size: 13px; color: var(--muted);">${esc(orc.cliente?.nome || '—')} • Nº ${esc(orc.numero)}</div>
            <div style="font-weight: 600; margin-top: 2px;">${esc(parcela.descricao)}</div>
            ${contexto}
          </div>

          <div class="field">
            <label>${ehEntrada ? 'Valor recebido' : 'Valor desta medição'}</label>
            <input type="number" step="0.01" min="0" value="${valorAtual || ''}" placeholder="${ehEntrada ? '' : 'R$ 0,00'}" oninput="actions.updatePagamentoForm('valor', this.value); render();" autofocus>
            <div style="font-size: 12px; margin-top: 4px; color: ${dicaCor};">${dica}</div>
          </div>

          <div class="field">
            <label>Data do pagamento</label>
            <input type="date" value="${esc(d.data)}" oninput="actions.updatePagamentoForm('data', this.value)">
          </div>

          <div class="field">
            <label>Forma / observação (opcional)</label>
            <input type="text" placeholder="${ehEntrada ? 'Ex: PIX, dinheiro, cheque...' : 'Ex: laje concretada / elétrica do 2º pav. / PIX'}" value="${esc(d.observacao || '')}" oninput="actions.updatePagamentoForm('observacao', this.value)">
          </div>

          <div class="row" style="gap: 8px; margin-top: 12px;">
            <button class="btn btn-ghost" onclick="actions.fecharModal()" style="flex: 1;">Cancelar</button>
            <button class="btn btn-primary" onclick="actions.salvarPagamento()" style="flex: 2;">${ICON.check} Confirmar</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderCatalogoSelectorListHTML() {
  const f = state.catalogoSelectorFiltro;
  const tipoFiltro = f.tipo || 'todos';
  const filtrados = state.catalogo.filter(i => {
    if (tipoFiltro !== 'todos' && (i.tipo || 'servico') !== tipoFiltro) return false;
    if (f.cat !== 'todas' && i.cat !== f.cat) return false;
    if (f.busca) {
      const b = f.busca.toLowerCase();
      return i.desc.toLowerCase().includes(b) || i.cat.toLowerCase().includes(b);
    }
    return true;
  });
  if (filtrados.length === 0) return '<div class="empty"><div class="empty-msg">Nenhum item encontrado.</div></div>';
  return filtrados.map(it => {
    const isMat = (it.tipo || 'servico') === 'material';
    return `
    <button class="cat-item" onclick="actions.addItem('${it.id}')">
      <div class="cat-item-head">
        <div style="flex: 1; min-width: 0;">
          <div class="cat-categoria">${esc(it.cat)}${isMat ? ' <span style="color: var(--info);">• MATERIAL</span>' : ''}</div>
          <div class="cat-desc">${esc(it.desc)}</div>
          <div class="cat-unidade">Unidade: ${esc(it.un)}</div>
        </div>
        <div class="cat-valor">${fmtBRL(it.val)}</div>
      </div>
    </button>
    `;
  }).join('');
}

function renderCatalogoSelectorList() {
  const el = document.getElementById('cat-selector-list');
  if (el) el.innerHTML = renderCatalogoSelectorListHTML();
}

<!-- ===== SERVICE WORKER (PWA / offline-first) ===== -->
<script>
// Registra o service worker pra habilitar funcionamento offline e instalação como app.
// Funciona apenas em HTTPS (e em localhost pra testes).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('service-worker.js')
      .then(function(reg) {
        console.log('✓ Service Worker registrado:', reg.scope);
        // Detecta atualizações em background
        reg.addEventListener('updatefound', function() {
          const newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // Nova versão disponível - usuário já tem o app instalado
                console.log('↻ Nova versão do app disponível. Recarregue para atualizar.');
              }
            });
          }
        });
      })
      .catch(function(err) {
        console.log('Service Worker não registrado (provavelmente HTTP local):', err.message);
      });
  });
}

// Prompt de instalação (Chrome/Edge no Android)
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Disponibiliza globalmente caso o app queira oferecer botão "Instalar"
  window._canInstallPWA = true;
});
window.addEventListener('appinstalled', function() {
  console.log('✓ App instalado na tela inicial');
  deferredInstallPrompt = null;
  window._canInstallPWA = false;
});
</script>
